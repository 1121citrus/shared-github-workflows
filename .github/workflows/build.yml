name: Build

# Reusable build workflow for 1121citrus Docker image repos.
#
# Builds a linux/amd64 image, re-tags it as :latest, and uploads it as
# the 'docker-image' artifact (retained 1 day) for downstream scan and
# test jobs to share.
#
# Usage:
#   jobs:
#     build:
#       needs: lint
#       uses: 1121citrus/shared-github-workflows/.github/workflows/build.yml@main
#       with:
#         image: 1121citrus/myapp
#         inject-metadata: true   # optional; default false

on:
  workflow_call:
    inputs:
      image:
        description: Docker Hub image name (e.g. 1121citrus/myapp)
        required: true
        type: string
      inject-metadata:
        description: >
          When true, inject VERSION, GIT_COMMIT, and BUILD_DATE as build-args
          at build time so the binary can report them at runtime.  Set for
          images whose test suites verify these values inside the container.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ inputs.image }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Compute metadata only when inject-metadata is true; outputs are empty
      # strings otherwise and the build-args step skips the heredoc content.
      - name: Set build metadata
        if: ${{ inputs.inject-metadata }}
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%dT%H%M%S)" >> "$GITHUB_OUTPUT"

      # Produce a build-args string for docker/build-push-action.
      # The heredoc syntax lets us emit a multi-line value safely.
      - name: Prepare build args
        id: args
        run: |
          if [[ "${{ inputs.inject-metadata }}" == "true" ]]; then
            {
              echo 'value<<EOF'
              echo "VERSION=${{ steps.meta.outputs.version }}"
              echo "GIT_COMMIT=${{ steps.meta.outputs.commit }}"
              echo "BUILD_DATE=${{ steps.meta.outputs.date }}"
              echo EOF
            } >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: ${{ inputs.image }}:ci-${{ github.sha }}
          build-args: ${{ steps.args.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Re-tag as :latest so test scripts that default to IMAGE:latest work
      # without modification.
      - name: Re-tag as :latest for test scripts
        run: docker tag "$IMAGE:ci-${{ github.sha }}" "$IMAGE:latest"

      - name: Save image for downstream jobs
        run: docker save "$IMAGE:latest" | gzip > /tmp/image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1
