name: Release Please

# Reusable Release Please workflow for 1121citrus repos.
#
# Watches for conventional commits on main/master and automates the release
# lifecycle: opens a release PR, bumps version.txt, prepends to CHANGELOG.md,
# and pushes a semver tag when the release PR is merged.
#
# Usage:
#   on:
#     push:
#       branches: [main, master]
#
#   permissions:
#     contents: write
#     pull-requests: write
#
#   jobs:
#     release-please:
#       uses: 1121citrus/shared-github-workflows/.github/workflows/release-please.yml@main
#       secrets: inherit

on:
  workflow_call: {}

# release-please-action needs write access to open release PRs and push tags.
permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # googleapis/release-please-action reads release-please-config.json and
      # .release-please-manifest.json from the repo root.
      # Dependabot will propose a SHA pin for this action on the next weekly run.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
