name: Push

# Reusable Docker Hub push workflow for 1121citrus Docker image repos.
#
# Builds a multi-platform image (amd64 + arm64) and pushes with SBOM and
# provenance attestations.  Never called directly — the calling ci.yml job
# must carry the trigger guard:
#
#   if: >
#     github.event_name == 'push' && (
#       startsWith(github.ref, 'refs/tags/v') ||
#       github.ref == 'refs/heads/staging'
#     )
#
# Version tags  → image:X.Y.Z + :X.Y + :X + :latest
# Staging branch → image:staging-<sha>  + :staging          (default)
#                  image:staging-YYYY.MM.DD.HHmmSS + :staging (timestamp mode)
#
# Usage:
#   jobs:
#     push:
#       needs: [test, scan]
#       if: >
#         github.event_name == 'push' && (
#           startsWith(github.ref, 'refs/tags/v') ||
#           github.ref == 'refs/heads/staging'
#         )
#       uses: 1121citrus/shared-github-workflows/.github/workflows/push.yml@main
#       with:
#         image: 1121citrus/myapp
#       secrets: inherit

on:
  workflow_call:
    inputs:
      image:
        description: Docker Hub image name (e.g. 1121citrus/myapp)
        required: true
        type: string
      staging-use-timestamp:
        description: >
          When true, use a UTC timestamp (YYYY.MM.DD.HHmmSS) in the staging
          tag instead of the default short commit SHA.
        type: boolean
        default: false
      platforms:
        description: Docker platforms to build for
        type: string
        default: linux/amd64,linux/arm64
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Compute a UTC timestamp used for staging tags and the VERSION fallback
      # when no semver tag is present, plus a short commit SHA for traceability.
      - name: Compute build metadata
        id: extras
        run: |
          echo "stamp=$(date -u +%Y.%m.%d.%H%M%S)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%dT%H%M%S)" >> "$GITHUB_OUTPUT"

      # Derive OCI-compatible tags and labels from the git context.
      # Version tags:   semver sub-tags (1.2.3, 1.2, 1, latest)
      # Staging branch: sha-based (default) or timestamp-based
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=staging-,format=short,enable=${{ !inputs.staging-use-timestamp && github.ref == 'refs/heads/staging' }}
            type=raw,value=staging-${{ steps.extras.outputs.stamp }},enable=${{ inputs.staging-use-timestamp && github.ref == 'refs/heads/staging' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}

      - name: Set up QEMU (multi-platform cross-compilation)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (multi-platform)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ inputs.platforms }}
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version || steps.extras.outputs.stamp }}
            GIT_COMMIT=${{ steps.extras.outputs.commit }}
            BUILD_DATE=${{ steps.extras.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
